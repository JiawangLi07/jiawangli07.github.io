<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 页面</title>
    <link rel="icon" href="cute_wang.jpg" type="image/png">
    
    <style>
        /* --- 1. 加载动画层样式 --- */
        #loader {
            position: fixed; /* 固定定位，覆盖全屏 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column; /* 垂直排列图片和文字 */
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 确保在最上层 */
        }

        .eating-animation {
            width: 120px;
            height: auto;
            /* 结合了缩放和微小位移的动画 */
            animation: swallow 1.2s ease-in-out infinite;
        }

        /* 动画关键帧：模拟咀嚼感 */
        @keyframes swallow {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.12) translateY(-5px); }
        }

        .loading-text {
            margin-top: 20px;
            font-family: sans-serif;
            color: #666;
            letter-spacing: 2px;
        }

        /* --- 2. 网页实际内容的样式 (示例) --- */
        .main-content {
            padding: 50px;
            text-align: center;
            font-family: "Microsoft YaHei", sans-serif;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="cute_wang.jpg" alt="Loading" class="eating-animation">
        <div class="loading-text">AI 正在消化数据...</div>
    </div>

    <div class="main-content">
        <h1>欢迎来到我的 GitHub Pages</h1>
        <p>这是一个测试页面，头像正在上方努力吃饼干。</p>
    </div>

</body>
</html>
